name: Keep Supabase Alive

on:
  schedule:
    # 每 3 天執行一次（確保永不超過 7 天無活動）
    - cron: '0 2 */3 * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Supabase API tests
        # 只跑 api.test.ts —— 它是唯一真正連接 Supabase 的測試文件
        # 其他測試需要 Gemini/Slack API keys，與保活 Supabase 無關
        run: npx vitest run services/__tests__/api.test.ts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
